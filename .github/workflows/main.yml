name: Build TownyBridge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Also allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: townybridge-${{ github.sha }}
          # NeoForge MDK puts the final jar (without -sources/-dev) here:
          path: build/libs/townybridge-*.jar
          # Exclude the dev/sources jars — only upload the release jar
          if-no-files-found: error
