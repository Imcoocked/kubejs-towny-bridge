name: Build TownyBridge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Downloads, installs, and caches Gradle automatically.
      # No gradlew wrapper files needed in the repo.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build
        run: gradle build --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: townybridge-${{ github.sha }}
          path: build/libs/townybridge-*.jar
          if-no-files-found: error
