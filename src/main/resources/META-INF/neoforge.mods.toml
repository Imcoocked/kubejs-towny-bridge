modLoader    = "javafml"
loaderVersion = "[4,)"
license      = "MIT"

# Server-only — no client distribution needed.
[[mods]]
    modId       = "townybridge"
    version     = "${file.jarVersion}"
    displayName = "Towny KubeJS Bridge"
    # IGNORE_ALL_VERSION = clients without this mod can still connect.
    # This is the correct NeoForge way to mark a mod as server-only.
    displayTest = "IGNORE_ALL_VERSION"
    description = '''
Exposes a safe, narrow Towny API surface to KubeJS server scripts on Mohist
servers, bypassing KubeJS's reflection-primitive class filter entirely.
'''

[[dependencies.townybridge]]
    modId        = "neoforge"
    type         = "required"
    versionRange = "[21.1,)"
    ordering     = "NONE"
    side         = "SERVER"

[[dependencies.townybridge]]
    modId        = "kubejs"
    type         = "required"
    versionRange = "[2101,)"
    ordering     = "AFTER"
    side         = "SERVER"
